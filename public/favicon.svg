<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Deep bordeaux background, rounded square -->
  <rect width="32" height="32" rx="7" fill="#2A0710"/>

  <!-- Grape cluster — 6 grapes in triangle formation -->
  <!-- Row 1 -->
  <circle cx="16" cy="8" r="3.5" fill="#C9A84C"/>
  <!-- Row 2 -->
  <circle cx="11.5" cy="14" r="3.5" fill="#C9A84C"/>
  <circle cx="20.5" cy="14" r="3.5" fill="#C9A84C"/>
  <!-- Row 3 -->
  <circle cx="7"  cy="20" r="3.5" fill="#C9A84C"/>
  <circle cx="16" cy="20" r="3.5" fill="#C9A84C"/>
  <circle cx="25" cy="20" r="3.5" fill="#C9A84C"/>

  <!-- Subtle light highlights for depth -->
  <circle cx="14.8" cy="6.8"  r="1.1" fill="#F0E4B0" opacity="0.42"/>
  <circle cx="10.3" cy="12.8" r="1.1" fill="#F0E4B0" opacity="0.42"/>
  <circle cx="19.3" cy="12.8" r="1.1" fill="#F0E4B0" opacity="0.42"/>
  <circle cx="5.8"  cy="18.8" r="1.1" fill="#F0E4B0" opacity="0.42"/>
  <circle cx="14.8" cy="18.8" r="1.1" fill="#F0E4B0" opacity="0.42"/>
  <circle cx="23.8" cy="18.8" r="1.1" fill="#F0E4B0" opacity="0.42"/>

  <!-- Stem -->
  <line x1="16" y1="4.5" x2="16" y2="2" stroke="#C9A84C" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Vine leaf -->
  <path d="M16 3 Q20.5 0.5 23 3 Q20.5 5.5 16 3Z" fill="#C9A84C"/>
</svg>
